databases:
  - name: job_agent_db
    databaseName: job_agent
    user: job_agent_user
    plan: free
    region: singapore # Change based on your pref

services:
  - type: cron
    name: ai_job_agent_cron
    env: python
    region: singapore # Ensure region matches DB
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"
    schedule: "0 * * * *" # Runs at the top of every hour
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job_agent_db
          property: connectionString
      - key: SERPAPI_KEY
        sync: false # Set via Render Dashboard
      - key: EMAIL_ADDRESS
        sync: false # Set via Render Dashboard
      - key: EMAIL_PASSWORD
        sync: false # Set via Render Dashboard
      - key: RECEIVER_EMAIL
        sync: false # Set via Render Dashboard
